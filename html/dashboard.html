<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
	<link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="/css/styles/home.css">
  <link rel="stylesheet" href="/css/styles/gallery.css">
  <link rel="stylesheet" href="/css/styles/calendar.css">
  <link rel="stylesheet" href="/css/styles/settings.css">
  <title>Dashboard</title>
</head>
<body>
  <div class="dashboard">
  <header class="header">
    <div class="header__left">
      <div class="header__menu-container">
        <div id="menu" class="header__menu">
          <span class="material-symbols-outlined header__span-menu">menu</span>
        </div>
      </div>
      <div class="header__brand-container">
        <img class="header__brand-logo" src="https://res.cloudinary.com/djtomsyj8/image/upload/f_webp/v1775004204/logo_oqaxn7.jpg" alt="Logo">
        <span class="header__brand-name">Photography</span>
      </div>
    </div>
    <div class="header__right">
      <a class="header__link" href="#">
        <span class="material-symbols-outlined header__span">notifications</span>
      </a>
      <!-- <a class="header__link" href="#">
        <span class="material-symbols-outlined header__span">task</span>
      </a> -->
      <div id="user-icon" class="user__logo"></div>
    </div>
  </header>

  <div id="sidebar" class="sidebar">
    <nav class="sidebar__nav">
      <ul class="sidebar__list">
        <li class="sidebar__item">
          <a class="sidebar__link --search" href="#" style="opacity: .5; pointer-events: none;">
            <span class="material-symbols-outlined sidebar__span">search</span>
            Search
          </a>
        </li>
        <li>
          <a class="sidebar__link --selected" href="#" data-view="home">
            <span class="material-symbols-outlined sidebar__span">home</span>
            Home
          </a>
        </li>
        <li>
          <a class="sidebar__link" href="#" data-view="gallery">
            <span class="material-symbols-outlined sidebar__span">photo_library</span>
            Gallery
          </a>
        </li>
        <li>
          <a class="sidebar__link" href="#" data-view="calendar" style="display: none">
            <span class="material-symbols-outlined sidebar__span">calendar_month</span>
            Calendar
          </a>
        </li>
        <li>
          <a class="sidebar__link" href="#" data-view="settings">
            <span class="material-symbols-outlined sidebar__span">settings</span>
            Settings
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <main id="app"></main>
  </div>
  <div class="btn__container">
    <button class="btn__logout" id="logout">Cerrar sesión</button>
  </div>

  <script type="module" src="/js/dashboard.js"></script>
  <script type="module" src="/js/utils/data.js"></script>
  <script type="module" src="/js/routes/home.js"></script>
  <script type="module" src="/js/routes/gallery.js"></script>
  <script type="module" src="/js/routes/calendar.js"></script>
  <script type="module" src="/js/routes/settings.js"></script>

</body>
</html>
